<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Anant 1.0 — Neural AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%238b5cf6'/></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;--sidebar:#0f1525;--chat:#0d1117;--card:#1a1f2e;
  --purple:#8b5cf6;--teal:#14b8a6;--text:#e2e8f0;--text2:#64748b;
  --border:rgba(255,255,255,.08);--user-msg:#1e293b;--ai-msg:#0f172a;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;font-size:14px}
a{color:var(--purple);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}

/* ── App shell ── */
#app{display:flex;height:100vh;width:100vw}

/* ── Login ── */
#login-page{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{width:380px;padding:40px;background:var(--sidebar);border-radius:16px;border:1px solid var(--border)}
.login-card h1{font-size:24px;font-weight:700;color:#fff;text-align:center;margin-bottom:4px;
  text-shadow:0 0 30px rgba(139,92,246,.4)}
.login-card .sub{text-align:center;color:var(--text2);font-size:12px;margin-bottom:28px}
.login-card .tabs{display:flex;gap:0;margin-bottom:24px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.login-card .tab{flex:1;padding:10px;text-align:center;background:transparent;color:var(--text2);font-size:13px;
  font-weight:500;transition:all .2s}
.login-card .tab.active{background:var(--purple);color:#fff}
.login-card label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.login-card input{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;margin-bottom:16px;transition:border-color .2s}
.login-card input:focus{border-color:var(--purple)}
.login-card .btn{width:100%;padding:12px;background:var(--purple);color:#fff;border-radius:8px;font-size:14px;
  font-weight:600;transition:all .2s;margin-top:4px}
.login-card .btn:hover{background:#7c3aed}
.login-card .btn:disabled{opacity:.5;cursor:not-allowed}
.login-card .error{color:var(--red);font-size:12px;margin-top:8px;min-height:18px}
.login-card .name-field{display:none}

/* ── Sidebar ── */
#sidebar{width:280px;min-width:280px;background:var(--sidebar);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100%;transition:margin-left .3s;z-index:50}
#sidebar.hidden{margin-left:-280px;min-width:0;width:0}
.sb-logo{padding:24px 20px 16px}
.sb-logo h1{font-size:18px;font-weight:700;color:#fff;text-shadow:0 0 24px rgba(139,92,246,.5)}
.sb-logo p{font-size:11px;color:var(--text2);margin-top:3px}
.sb-nav{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:2px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--text2);
  font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;background:transparent;width:100%;text-align:left}
.sb-item:hover{background:rgba(139,92,246,.08);color:var(--text)}
.sb-item.active{background:rgba(139,92,246,.15);color:var(--purple)}
.sb-item svg{width:18px;height:18px;flex-shrink:0}
.sb-divider{height:1px;background:var(--border);margin:8px 0}
.sb-bottom{padding:16px 20px;border-top:1px solid var(--border)}
.sb-user{font-size:12px;color:var(--text2);margin-bottom:8px}
.sb-logout{padding:8px 12px;border-radius:6px;background:transparent;color:var(--text2);font-size:12px;
  border:1px solid var(--border);width:100%;transition:all .2s}
.sb-logout:hover{border-color:var(--red);color:var(--red)}

/* ── Hamburger ── */
#hamburger{display:none;position:fixed;top:12px;left:12px;z-index:60;background:var(--sidebar);
  border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text)}

/* ── Main area ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

/* ── Top bar ── */
#topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;
  background:var(--chat);flex-shrink:0}
#topbar h2{font-size:15px;font-weight:600;color:var(--text)}
.persona-pill{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;
  background:rgba(139,92,246,.15);color:var(--purple)}

/* ── Chat messages ── */
#messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:720px;animation:fadeIn .3s ease}
.msg.user{align-self:flex-end}
.msg.ai{align-self:flex-start}
.msg-bubble{padding:14px 18px;border-radius:12px;line-height:1.6;font-size:14px;position:relative}
.msg.user .msg-bubble{background:var(--user-msg);border-bottom-right-radius:4px}
.msg.ai .msg-bubble{background:var(--ai-msg);border-left:3px solid var(--purple);border-bottom-left-radius:4px}
.msg-time{font-size:10px;color:var(--text2);margin-top:6px}
.msg.user .msg-time{text-align:right}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Think block ── */
.think-toggle{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);
  cursor:pointer;margin-bottom:8px;padding:4px 10px;border-radius:6px;background:rgba(139,92,246,.08);
  border:1px solid rgba(139,92,246,.12);transition:all .2s}
.think-toggle:hover{background:rgba(139,92,246,.15)}
.think-toggle svg{width:12px;height:12px;transition:transform .2s}
.think-toggle.open svg{transform:rotate(90deg)}
.think-content{display:none;font-size:12px;color:var(--text2);line-height:1.5;padding:10px 14px;
  margin-bottom:10px;background:rgba(139,92,246,.05);border-radius:8px;border:1px solid rgba(139,92,246,.08)}
.think-content.open{display:block}

/* ── Feedback ── */
.msg-feedback{display:flex;gap:6px;margin-top:8px}
.msg-feedback button{padding:4px 8px;border-radius:6px;font-size:11px;color:var(--text2);
  background:transparent;border:1px solid var(--border);transition:all .2s;display:flex;align-items:center;gap:4px}
.msg-feedback button:hover{border-color:var(--purple);color:var(--text)}
.msg-feedback button.voted{border-color:var(--purple);color:var(--purple);background:rgba(139,92,246,.1)}

/* ── Typing indicator ── */
.typing{display:flex;gap:4px;padding:14px 18px;align-self:flex-start}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--text2);animation:blink 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* ── Input area ── */
#input-area{padding:16px 20px;border-top:1px solid var(--border);background:var(--chat);flex-shrink:0}
#input-wrap{display:flex;gap:8px;align-items:flex-end;max-width:760px;margin:0 auto}
#msg-input{flex:1;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-size:14px;resize:none;max-height:150px;line-height:1.5;transition:border-color .2s}
#msg-input:focus{border-color:var(--purple)}
#send-btn{padding:12px 16px;background:var(--purple);color:#fff;border-radius:12px;font-size:14px;
  font-weight:600;transition:all .2s;flex-shrink:0;height:46px}
#send-btn:hover{background:#7c3aed}
#send-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Right panel ── */
#rpanel{position:absolute;right:0;top:0;bottom:0;width:360px;background:var(--sidebar);
  border-left:1px solid var(--border);transform:translateX(100%);transition:transform .3s;
  z-index:40;display:flex;flex-direction:column;overflow-y:auto}
#rpanel.open{transform:translateX(0)}
.rp-header{padding:20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.rp-header h3{font-size:15px;font-weight:600}
.rp-close{background:transparent;color:var(--text2);font-size:18px;padding:4px 8px;border-radius:6px;transition:all .15s}
.rp-close:hover{background:var(--card);color:var(--text)}
.rp-body{padding:20px;flex:1}

/* ── Profile view ── */
.profile-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.profile-row .k{color:var(--text2)}.profile-row .v{color:var(--text);font-weight:500}
.pref-tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;margin:3px 4px 3px 0}
.pref-tag.pos{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.pref-tag.neg{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}

/* ── Stats view ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-card{padding:16px;background:var(--card);border-radius:10px;border:1px solid var(--border);text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:var(--purple)}
.stat-card .lbl{font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:1px}

/* ── Emotions view ── */
.emo-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.emo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.emo-state{font-weight:500;flex:1}.emo-time{color:var(--text2);font-size:11px}

/* ── Pattern view ── */
.pat-item{padding:12px 0;border-bottom:1px solid var(--border)}
.pat-item .desc{font-size:13px;line-height:1.4}.pat-item .meta{font-size:11px;color:var(--text2);margin-top:4px}
.pat-item .conf{color:var(--purple);font-weight:600}

/* ── Graph view ── */
#graph-frame{position:absolute;inset:0;border:none;width:100%;height:100%;background:var(--bg)}

/* ── Markdown in messages ── */
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{margin:12px 0 6px;font-weight:600;color:#fff}
.msg-bubble h1{font-size:18px}.msg-bubble h2{font-size:16px}.msg-bubble h3{font-size:14px}
.msg-bubble p{margin:4px 0}.msg-bubble ul,.msg-bubble ol{padding-left:20px;margin:6px 0}
.msg-bubble li{margin:3px 0}
.msg-bubble code{background:rgba(139,92,246,.12);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono',Menlo,monospace}
.msg-bubble pre{background:#0a0a1a;border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin:8px 0;overflow-x:auto}
.msg-bubble pre code{background:none;padding:0;font-size:13px}
.msg-bubble strong{color:#fff}
.msg-bubble blockquote{border-left:3px solid var(--purple);padding-left:12px;color:var(--text2);margin:8px 0}

/* ── Loading ── */
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--purple);
  border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Empty state ── */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty h3{font-size:18px;color:var(--text);margin-bottom:8px}

/* ── Mobile ── */
@media(max-width:768px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50}
  #sidebar.hidden{margin-left:-280px}
  #hamburger{display:block}
  #rpanel{width:100%}
  .msg{max-width:100%}
}
</style>
</head>
<body>

<!-- ── Login page ── -->
<div id="login-page">
  <div class="login-card">
    <h1>Anant 1.0</h1>
    <p class="sub">Neural AI — Sovereign AI with Persistent Memory</p>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <form id="auth-form" onsubmit="handleAuth(event)">
      <div class="name-field" id="name-field">
        <label>Name</label>
        <input type="text" id="auth-name" placeholder="Your name (optional)">
      </div>
      <label>Username</label>
      <input type="text" id="auth-user" placeholder="Enter username" required autocomplete="username">
      <label>Password</label>
      <input type="password" id="auth-pass" placeholder="Enter password" required autocomplete="current-password">
      <button type="submit" class="btn" id="auth-btn">Login</button>
      <div class="error" id="auth-error"></div>
    </form>
  </div>
</div>

<!-- ── App ── -->
<div id="app" style="display:none">

  <!-- Hamburger -->
  <button id="hamburger" onclick="toggleSidebar()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 12h18M3 6h18M3 18h18"/>
    </svg>
  </button>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sb-logo">
      <h1>Anant 1.0</h1>
      <p>Neural AI — Sovereign AI</p>
    </div>
    <nav class="sb-nav">
      <button class="sb-item active" data-view="chat" onclick="switchView('chat')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Chat
      </button>
      <button class="sb-item" data-view="graph" onclick="switchView('graph')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><path d="M14.5 9.5l3-3M9.5 14.5l-3 3"/></svg>
        Memory Graph
      </button>
      <button class="sb-item" data-view="profile" onclick="switchView('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </button>
      <button class="sb-item" data-view="emotions" onclick="switchView('emotions')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>
        Emotions
      </button>
      <button class="sb-item" data-view="patterns" onclick="switchView('patterns')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2zM22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
        Patterns
      </button>
      <button class="sb-item" data-view="stats" onclick="switchView('stats')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        Stats
      </button>
      <div class="sb-divider"></div>
      <button class="sb-item" onclick="triggerDream()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
        Dream Cycle
      </button>
      <button class="sb-item" onclick="confirmForget()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Clear Memory
      </button>
    </nav>
    <div class="sb-bottom">
      <div class="sb-user" id="sb-user-info"></div>
      <button class="sb-logout" onclick="logout()">Logout</button>
    </div>
  </aside>

  <!-- Main area -->
  <div id="main">
    <!-- Chat view -->
    <div id="chat-view">
      <div id="topbar">
        <h2>Anant 1.0</h2>
        <span class="persona-pill" id="persona-pill">general</span>
      </div>
      <div id="messages">
        <div class="empty" id="chat-empty">
          <h3>Start a conversation</h3>
          <p>Say hello to Anant — your AI with persistent memory</p>
        </div>
      </div>
      <div id="input-area">
        <div id="input-wrap">
          <textarea id="msg-input" rows="1" placeholder="Message Anant..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

    <!-- Graph view (hidden by default) -->
    <div id="graph-view" style="display:none;position:absolute;inset:0">
      <div id="topbar" style="position:relative;z-index:2">
        <h2>Memory Graph</h2>
      </div>
      <div style="position:absolute;top:52px;left:0;right:0;bottom:0">
        <iframe id="graph-frame" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>

    <!-- Right panel -->
    <div id="rpanel">
      <div class="rp-header">
        <h3 id="rp-title">Panel</h3>
        <button class="rp-close" onclick="closePanel()">&times;</button>
      </div>
      <div class="rp-body" id="rp-body"></div>
    </div>
  </div>
</div>

<script>
/* ====================================================================
   Anant 1.0 Frontend — Neural AI
   ==================================================================== */

const API_URL = "https://scoldedly-unfinical-julius.ngrok-free.dev";

let authMode = "login";
let currentPersona = "general";
let chatHistory = [];

/* ── API helper ── */
async function api(method, endpoint, body) {
  const token = sessionStorage.getItem("anant_token");
  const h = {"Content-Type":"application/json","ngrok-skip-browser-warning":"true"};
  if (token) h["Authorization"] = "Bearer " + token;
  const opts = {method, headers: h};
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(API_URL + endpoint, opts);
    if (r.status === 401) { sessionStorage.removeItem("anant_token"); showLogin(); return null; }
    if (r.status === 429) { alert("Rate limit exceeded. Please wait."); return null; }
    return await r.json();
  } catch(e) { console.error("API error:", e); return null; }
}

/* ── Auth ── */
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll(".login-card .tab").forEach((t,i) => t.classList.toggle("active", (i===0&&mode==="login")||(i===1&&mode==="signup")));
  document.getElementById("name-field").style.display = mode === "signup" ? "block" : "none";
  document.getElementById("auth-btn").textContent = mode === "login" ? "Login" : "Sign Up";
  document.getElementById("auth-error").textContent = "";
}

async function handleAuth(e) {
  e.preventDefault();
  const btn = document.getElementById("auth-btn");
  const err = document.getElementById("auth-error");
  const user = document.getElementById("auth-user").value.trim();
  const pass = document.getElementById("auth-pass").value;
  const name = document.getElementById("auth-name").value.trim();
  if (!user || !pass) { err.textContent = "Please fill all fields"; return; }
  btn.disabled = true; btn.textContent = "Please wait..."; err.textContent = "";
  const endpoint = authMode === "login" ? "/api/auth/login" : "/api/auth/signup";
  const body = authMode === "login" ? {username:user,password:pass} : {username:user,password:pass,name:name||null};
  const data = await api("POST", endpoint, body);
  btn.disabled = false; btn.textContent = authMode === "login" ? "Login" : "Sign Up";
  if (!data) { err.textContent = "Connection failed"; return; }
  if (data.detail) { err.textContent = data.detail; return; }
  if (data.access_token) {
    sessionStorage.setItem("anant_token", data.access_token);
    sessionStorage.setItem("anant_uid", data.user_id);
    sessionStorage.setItem("anant_user", user);
    showApp();
  } else { err.textContent = "Unexpected error"; }
}

function showLogin() {
  document.getElementById("login-page").style.display = "flex";
  document.getElementById("app").style.display = "none";
}

function showApp() {
  document.getElementById("login-page").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("sb-user-info").textContent = sessionStorage.getItem("anant_user") || "";
  document.getElementById("msg-input").focus();
}

function logout() {
  sessionStorage.clear();
  chatHistory = [];
  document.getElementById("messages").innerHTML = '<div class="empty" id="chat-empty"><h3>Start a conversation</h3><p>Say hello to Anant — your AI with persistent memory</p></div>';
  showLogin();
}

/* ── Init ── */
if (sessionStorage.getItem("anant_token")) { showApp(); } else { showLogin(); }

/* ── Sidebar ── */
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("hidden");
}

/* ── Views ── */
function switchView(view) {
  document.querySelectorAll(".sb-item[data-view]").forEach(b => b.classList.toggle("active", b.dataset.view === view));
  document.getElementById("chat-view").style.display = view === "chat" ? "" : "none";
  document.getElementById("graph-view").style.display = view === "graph" ? "" : "none";
  closePanel();
  if (view === "graph") loadGraph();
  else if (view === "profile") openPanel("Profile", loadProfile);
  else if (view === "emotions") openPanel("Emotions", loadEmotions);
  else if (view === "patterns") openPanel("Patterns", loadPatterns);
  else if (view === "stats") openPanel("Stats", loadStats);
  if (view !== "chat" && view !== "graph") {
    document.getElementById("chat-view").style.display = "";
  }
  // Close sidebar on mobile after selection
  if (window.innerWidth <= 768) document.getElementById("sidebar").classList.add("hidden");
}

function openPanel(title, loadFn) {
  document.getElementById("rp-title").textContent = title;
  document.getElementById("rp-body").innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner"></div></div>';
  document.getElementById("rpanel").classList.add("open");
  loadFn();
}

function closePanel() {
  document.getElementById("rpanel").classList.remove("open");
}

/* ── Markdown renderer ── */
function md(text) {
  if (!text) return "";
  let s = text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`)
    // Inline code
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    // Headers
    .replace(/^### (.+)$/gm, "<h3>$1</h3>")
    .replace(/^## (.+)$/gm, "<h2>$1</h2>")
    .replace(/^# (.+)$/gm, "<h1>$1</h1>")
    // Bold & italic
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    // Blockquote
    .replace(/^> (.+)$/gm, "<blockquote>$1</blockquote>")
    // Unordered lists
    .replace(/^- (.+)$/gm, "<li>$1</li>")
    // Ordered lists
    .replace(/^\d+\. (.+)$/gm, "<li>$1</li>");
  // Wrap consecutive <li> in <ul>
  s = s.replace(/(<li>.*?<\/li>\n?)+/g, m => "<ul>" + m + "</ul>");
  // Paragraphs
  s = s.replace(/\n\n/g, "</p><p>").replace(/\n/g, "<br>");
  return "<p>" + s + "</p>";
}

/* ── Chat ── */
function now() {
  return new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

function addMessage(role, text, thinking, persona) {
  const empty = document.getElementById("chat-empty");
  if (empty) empty.remove();
  const el = document.createElement("div");
  el.className = "msg " + role;
  const id = "msg-" + Date.now();
  if (role === "ai") {
    let thinkHtml = "";
    if (thinking) {
      thinkHtml = `<div class="think-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        Thought process
      </div>
      <div class="think-content">${md(thinking)}</div>`;
    }
    el.innerHTML = `${thinkHtml}<div class="msg-bubble">${md(text)}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
        <div class="msg-feedback">
          <button onclick="sendFeedback('good',this)">&#x1F44D; Good</button>
          <button onclick="sendFeedback('bad',this)">&#x1F44E; Bad</button>
        </div>
        <span class="msg-time">${now()}</span>
      </div>`;
    if (persona) document.getElementById("persona-pill").textContent = persona;
  } else {
    el.innerHTML = `<div class="msg-bubble">${md(text)}</div><div class="msg-time">${now()}</div>`;
  }
  document.getElementById("messages").appendChild(el);
  scrollToBottom();
}

function showTyping() {
  const el = document.createElement("div");
  el.className = "typing"; el.id = "typing";
  el.innerHTML = "<span></span><span></span><span></span>";
  document.getElementById("messages").appendChild(el);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}

function scrollToBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("msg-input");
  const btn = document.getElementById("send-btn");
  const text = input.value.trim();
  if (!text) return;
  input.value = ""; input.style.height = "auto";
  btn.disabled = true;
  addMessage("user", text);
  showTyping();
  const data = await api("POST", "/api/chat", {message: text});
  hideTyping();
  btn.disabled = false;
  if (data && data.response) {
    addMessage("ai", data.response, data.thinking, data.persona);
    currentPersona = data.persona || "general";
  } else if (data && data.detail) {
    addMessage("ai", "Error: " + data.detail);
  } else {
    addMessage("ai", "Sorry, could not connect to the server.");
  }
  input.focus();
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  if (e.key === "Escape") closePanel();
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 150) + "px";
}

async function sendFeedback(type, btn) {
  const parent = btn.parentElement;
  parent.querySelectorAll("button").forEach(b => b.classList.remove("voted"));
  btn.classList.add("voted");
  await api("POST", "/api/feedback", {feedback: type});
}

/* ── Profile ── */
async function loadProfile() {
  const data = await api("GET", "/api/profile");
  if (!data) return;
  const body = document.getElementById("rp-body");
  const fields = [
    ["Name", data.name], ["Age", data.age], ["Location", data.location],
    ["Occupation", data.occupation], ["Education", data.education],
    ["Company", data.company], ["Mood", data.mood]
  ];
  let html = fields.map(([k,v]) => `<div class="profile-row"><span class="k">${k}</span><span class="v">${v||"—"}</span></div>`).join("");
  const prefs = data.preferences || {};
  if (Object.keys(prefs).length) {
    html += '<div style="margin-top:16px"><div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Preferences</div>';
    for (const [item, sent] of Object.entries(prefs)) {
      const cls = sent === "negative" ? "neg" : "pos";
      html += `<span class="pref-tag ${cls}">${item}</span>`;
    }
    html += "</div>";
  }
  body.innerHTML = html || '<div class="empty"><p>No profile data yet. Start chatting!</p></div>';
}

/* ── Emotions ── */
async function loadEmotions() {
  const data = await api("GET", "/api/emotions?days=30");
  if (!data) return;
  const body = document.getElementById("rp-body");
  if (!data.emotions || !data.emotions.length) { body.innerHTML = '<div class="empty"><p>No emotions recorded yet</p></div>'; return; }
  const colors = {happy:"var(--green)",excited:"var(--amber)",stressed:"var(--red)",sad:"#3b82f6",angry:"var(--red)",tired:"var(--text2)",neutral:"var(--text2)"};
  body.innerHTML = data.emotions.slice(-30).reverse().map(e =>
    `<div class="emo-item"><span class="emo-dot" style="background:${colors[e.state]||"var(--text2)"}"></span><span class="emo-state">${e.state}</span><span class="emo-time">${e.timestamp?new Date(e.timestamp).toLocaleDateString():""}</span></div>`
  ).join("");
}

/* ── Stats ── */
async function loadStats() {
  const data = await api("GET", "/api/stats");
  if (!data) return;
  const body = document.getElementById("rp-body");
  const items = [["entities","Entities"],["memories","Memories"],["relationships","Relationships"],["emotions","Emotions"],["patterns","Patterns"]];
  body.innerHTML = '<div class="stat-grid">' + items.map(([k,l]) =>
    `<div class="stat-card"><div class="num">${data[k]||0}</div><div class="lbl">${l}</div></div>`
  ).join("") + "</div>";
}

/* ── Patterns ── */
async function loadPatterns() {
  const data = await api("GET", "/api/patterns");
  if (!data) return;
  const body = document.getElementById("rp-body");
  if (!data.patterns || !data.patterns.length) { body.innerHTML = '<div class="empty"><p>No patterns discovered yet</p></div>'; return; }
  body.innerHTML = data.patterns.map(p =>
    `<div class="pat-item"><div class="desc">${p.description}</div><div class="meta">${p.type} &middot; <span class="conf">${Math.round(p.confidence*100)}%</span></div></div>`
  ).join("");
}

/* ── Graph ── */
async function loadGraph() {
  const frame = document.getElementById("graph-frame");
  frame.srcdoc = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a1a;color:#64748b"><div class="spinner" style="width:30px;height:30px;border:3px solid rgba(255,255,255,.08);border-top-color:#8b5cf6;border-radius:50%;animation:spin .6s linear infinite"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style></div>';
  const data = await api("GET", "/api/graph");
  if (data && data.html) {
    frame.srcdoc = data.html;
  } else {
    frame.srcdoc = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a1a;color:#64748b">Failed to load graph</div>';
  }
}

/* ── Dream ── */
async function triggerDream() {
  const data = await api("POST", "/api/dream");
  if (data) {
    alert(`Dream complete!\nInsights: ${data.insights_generated}\nConsolidated: ${data.memories_consolidated}\nDecayed: ${data.memories_decayed}`);
  }
}

/* ── Forget ── */
async function confirmForget() {
  if (!confirm("This will permanently erase ALL your memories. Are you sure?")) return;
  const data = await api("POST", "/api/forget");
  if (data) {
    chatHistory = [];
    document.getElementById("messages").innerHTML = '<div class="empty" id="chat-empty"><h3>Memory cleared</h3><p>All data has been erased. Start fresh!</p></div>';
  }
}

/* ── Keyboard shortcut ── */
document.addEventListener("keydown", e => { if (e.key === "Escape") closePanel(); });
</script>
