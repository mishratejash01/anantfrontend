<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Anant — Neural AI</title>
<meta property="og:title" content="Anant 1.0 — Neural AI">
<meta property="og:description" content="India's first sovereign AI with persistent memory">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%238b5cf6'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:rgba(139,92,246,.3)}
:root{
  --bg:#000;--sb:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;
  --purple:#8b5cf6;--glow:rgba(139,92,246,.15);
  --text:#fff;--text2:#888;--text3:#555;--text4:#333;
  --border:rgba(255,255,255,.06);--ububble:#1a1a2e;
  --green:#22c55e;--red:#ef4444;--amber:#eab308;--blue:#3b82f6;--pink:#ec4899;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}
input,textarea{font-family:inherit;outline:none;border:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#444}

/* ═══ LOGIN ═══ */
#login{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;
  align-items:center;justify-content:center;animation:fadeIn .5s}
.lc{width:400px;max-width:90vw;background:var(--sb);border:1px solid var(--border);
  border-radius:16px;padding:40px}
.lc-logo{text-align:center;margin-bottom:32px}
.lc-logo h1{font-size:32px;font-weight:600;color:#fff;letter-spacing:-.5px}
.lc-logo p{color:var(--text3);font-size:14px;margin-top:6px}
.lc-tabs{display:flex;gap:24px;margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:0}
.lc-tab{padding:0 0 12px;color:var(--text3);font-size:14px;font-weight:500;
  background:none;border-bottom:2px solid transparent;transition:all .2s}
.lc-tab.on{color:#fff;border-bottom-color:var(--purple)}
.lc input[type=text],.lc input[type=password]{width:100%;padding:14px 16px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  color:#fff;font-size:14px;margin-bottom:16px;transition:all .2s}
.lc input:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--glow)}
.lc input::placeholder{color:var(--text3)}
.lc-label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
.lc-btn{width:100%;height:48px;background:var(--purple);color:#fff;border-radius:12px;
  font-size:15px;font-weight:500;transition:all .2s;margin-top:8px;display:flex;
  align-items:center;justify-content:center;gap:8px}
.lc-btn:hover{background:#7c3aed}
.lc-btn:disabled{opacity:.5;cursor:not-allowed}
.lc-err{color:var(--red);font-size:13px;margin-top:12px;min-height:20px;text-align:center}
.lc-name{display:none}
.lc-footer{text-align:center;color:var(--text4);font-size:12px;margin-top:24px}

/* ═══ APP SHELL ═══ */
#app{display:none;height:100vh;width:100vw}

/* ═══ SIDEBAR ═══ */
#sb{width:260px;min-width:260px;background:var(--sb);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100%;transition:all .25s ease;overflow:hidden}
#sb.shut{width:0;min-width:0;border-right:none}
.sb-top{padding:24px 20px 20px}
.sb-brand{display:flex;align-items:center;gap:10px}
.sb-brand h1{font-size:22px;font-weight:600;letter-spacing:-.3px}
.sb-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;
  box-shadow:0 0 8px var(--green)}
.sb-sub{color:var(--text3);font-size:12px;margin-top:4px}
.sb-new{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  margin-top:16px;padding:10px;background:var(--surface);border-radius:12px;
  color:var(--text2);font-size:13px;font-weight:500;transition:all .2s}
.sb-new:hover{background:var(--surface2);color:#fff;box-shadow:0 0 20px var(--glow)}
.sb-nav{flex:1;padding:12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sb-i{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  color:var(--text2);font-size:13px;font-weight:400;transition:all .15s;width:100%;text-align:left;
  border-left:2px solid transparent}
.sb-i:hover{background:rgba(255,255,255,.04);color:var(--text)}
.sb-i.on{color:var(--purple);border-left-color:var(--purple);background:rgba(139,92,246,.06)}
.sb-i svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
.sb-i.on svg{opacity:1}
.sb-sep{height:1px;background:var(--border);margin:6px 12px}
.sb-foot{padding:16px 20px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--purple);display:flex;
  align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
.sb-uname{font-size:13px;color:var(--text);font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-out{color:var(--text3);padding:4px;border-radius:6px;transition:all .15s}
.sb-out:hover{color:var(--red);background:rgba(239,68,68,.1)}
.sb-out svg{width:16px;height:16px}
.sb-pw{font-size:11px;color:var(--text4);text-align:center;margin-top:4px}

/* ═══ HAMBURGER ═══ */
#ham{display:none;position:fixed;top:14px;left:14px;z-index:60;color:#fff;
  padding:8px;border-radius:8px;background:rgba(10,10,10,.8);backdrop-filter:blur(8px);
  border:1px solid var(--border)}
#ham svg{width:20px;height:20px}

/* ═══ MAIN ═══ */
#main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;background:var(--bg)}

/* ═══ CHAT VIEW ═══ */
#cv{display:flex;flex-direction:column;flex:1;position:relative;min-height:0}

/* ═══ TOPBAR ═══ */
#top{height:56px;flex-shrink:0;display:flex;align-items:center;padding:0 24px;
  border-bottom:1px solid var(--border);gap:12px}
#top h2{font-size:15px;font-weight:600;flex:1}
.pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:.3px}
.pill-general{background:rgba(136,136,136,.12);color:#888}
.pill-work{background:rgba(59,130,246,.12);color:var(--blue)}
.pill-casual{background:rgba(34,197,94,.12);color:var(--green)}
.pill-health{background:rgba(239,68,68,.12);color:var(--red)}
.pill-learning{background:rgba(139,92,246,.12);color:var(--purple)}
.pill-emotional{background:rgba(236,72,153,.12);color:var(--pink)}

/* ═══ MESSAGES ═══ */
#msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding-bottom:120px}
.msgs-inner{max-width:768px;width:100%;margin:0 auto;padding:24px 24px 16px;display:flex;flex-direction:column;gap:24px}

/* Welcome */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 120px;gap:16px}
.welcome h2{font-size:28px;font-weight:600;letter-spacing:-.5px}
.welcome p{color:var(--text2);font-size:15px}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;justify-content:center}
.chip{padding:10px 18px;background:var(--surface);border:1px solid var(--border);border-radius:24px;
  color:var(--text2);font-size:13px;transition:all .2s}
.chip:hover{background:var(--surface2);color:#fff;transform:scale(1.02);border-color:rgba(139,92,246,.2)}

/* User msg */
.m{animation:msgIn .3s ease-out}
.m-u{display:flex;justify-content:flex-end}
.m-u-b{background:var(--ububble);padding:12px 18px;border-radius:20px 20px 4px 20px;
  max-width:80%;font-size:15px;line-height:1.6}

/* AI msg */
.m-a{padding:0}
.m-a-label{font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:500}
.m-a-body{font-size:15px;line-height:1.7;color:rgba(255,255,255,.92)}
.m-a-body h1,.m-a-body h2,.m-a-body h3{font-weight:600;color:#fff;margin:16px 0 8px}
.m-a-body h1{font-size:20px}.m-a-body h2{font-size:17px}.m-a-body h3{font-size:15px}
.m-a-body p{margin:6px 0}
.m-a-body strong{color:#fff;font-weight:500}
.m-a-body em{color:#ccc;font-style:italic}
.m-a-body code{background:var(--ububble);padding:2px 7px;border-radius:5px;font-size:13px;
  font-family:'SF Mono','Fira Code',monospace}
.m-a-body pre{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:16px;margin:12px 0;overflow-x:auto}
.m-a-body pre code{background:none;padding:0;font-size:13px}
.m-a-body ul,.m-a-body ol{padding-left:20px;margin:8px 0}
.m-a-body li{margin:4px 0}
.m-a-body li::marker{color:var(--text3)}
.m-a-body blockquote{border-left:2px solid var(--text4);padding-left:16px;color:var(--text2);margin:10px 0}
.m-a-body a{color:var(--purple);text-decoration:none}
.m-a-body a:hover{text-decoration:underline}

/* Think */
.think-t{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);
  cursor:pointer;margin-bottom:10px;padding:5px 12px;border-radius:8px;
  background:rgba(255,255,255,.03);transition:all .2s}
.think-t:hover{background:rgba(255,255,255,.06);color:var(--text2)}
.think-t svg{width:10px;height:10px;transition:transform .2s}
.think-t.open svg{transform:rotate(90deg)}
.think-c{max-height:0;overflow:hidden;transition:max-height .3s ease;font-size:13px;
  color:var(--text2);line-height:1.5;font-style:italic;border-left:2px solid var(--purple);
  padding-left:14px;margin-bottom:8px}
.think-c.open{max-height:800px;padding-top:4px;padding-bottom:4px}

/* Feedback */
.m-fb{display:flex;gap:4px;margin-top:10px;opacity:0;transition:opacity .2s}
.m:hover .m-fb{opacity:1}
.m-fb button{color:var(--text4);padding:4px 6px;border-radius:6px;transition:all .15s}
.m-fb button:hover{color:var(--text2);background:rgba(255,255,255,.04)}
.m-fb button.voted{color:var(--purple)}
.m-fb button svg{width:14px;height:14px}

.m-time{font-size:11px;color:var(--text4);margin-top:6px}
.m-u .m-time{text-align:right}

/* Typing */
.typing{padding:0 24px;max-width:768px;margin:0 auto;width:100%}
.typing-inner{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:13px}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.typing-dots span:nth-child(1){animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation:bounce 1.4s infinite .15s}
.typing-dots span:nth-child(3){animation:bounce 1.4s infinite .3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
@keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ═══ INPUT ═══ */
#inp{position:absolute;bottom:0;left:0;right:0;z-index:30;padding:16px 24px 12px;
  background:var(--bg);border-top:1px solid var(--border)}
.inp-wrap{max-width:768px;margin:0 auto}
.inp-box{display:flex;align-items:flex-end;gap:0;background:var(--surface);
  border:1px solid var(--border);border-radius:16px;padding:6px 6px 6px 18px;transition:border-color .2s}
.inp-box:focus-within{border-color:rgba(139,92,246,.3)}
#mi{flex:1;background:none;color:#fff;font-size:15px;padding:10px 0;resize:none;
  max-height:150px;line-height:1.5}
#mi::placeholder{color:var(--text3)}
#send{width:40px;height:40px;border-radius:12px;background:var(--purple);color:#fff;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
#send:hover{background:#7c3aed}
#send:disabled{background:var(--text4);cursor:not-allowed}
#send:active{transform:scale(.95)}
#send svg{width:18px;height:18px}
.inp-note{text-align:center;font-size:11px;color:var(--text4);margin-top:8px}

/* ═══ RIGHT PANEL ═══ */
#rp{position:absolute;right:0;top:0;bottom:0;width:380px;background:var(--sb);
  border-left:1px solid var(--border);transform:translateX(100%);transition:transform .3s ease;
  z-index:40;display:flex;flex-direction:column;overflow-y:auto}
#rp.open{transform:translateX(0)}
.rp-h{padding:20px 24px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);flex-shrink:0}
.rp-h h3{font-size:16px;font-weight:600}
.rp-x{color:var(--text3);padding:6px;border-radius:8px;transition:all .15s}
.rp-x:hover{background:var(--surface);color:#fff}
.rp-x svg{width:18px;height:18px}
.rp-b{padding:24px;flex:1}

/* Profile */
.pf-top{text-align:center;margin-bottom:24px}
.pf-av{width:64px;height:64px;border-radius:50%;background:var(--purple);margin:0 auto 12px;
  display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:600}
.pf-name{font-size:18px;font-weight:600}.pf-occ{color:var(--text2);font-size:13px;margin-top:2px}
.pf-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px}
.pf-row .k{color:var(--text3)}.pf-row .v{color:var(--text);font-weight:500}
.pf-sec{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;
  margin:20px 0 10px;font-weight:600}
.pref-t{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;
  font-size:12px;margin:3px 4px 3px 0;background:rgba(255,255,255,.03);border:1px solid var(--border)}
.pref-t.pos{color:var(--green)}.pref-t.pos::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green)}
.pref-t.neg{color:var(--red)}.pref-t.neg::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--red)}

/* Stats */
.st-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.st-card{padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;text-align:center}
.st-card .n{font-size:28px;font-weight:600;color:#fff}
.st-card .l{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.8px}

/* Emotions */
.em-i{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.em-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.em-st{font-size:13px;font-weight:500;flex:1;text-transform:capitalize}
.em-bar{width:40px;height:4px;border-radius:2px;background:var(--surface);overflow:hidden}
.em-bar-fill{height:100%;border-radius:2px}
.em-time{font-size:11px;color:var(--text3);min-width:60px;text-align:right}

/* Patterns */
.pt-i{padding:14px 0;border-bottom:1px solid var(--border)}
.pt-desc{font-size:13px;line-height:1.5}
.pt-meta{display:flex;align-items:center;gap:8px;margin-top:8px}
.pt-type{font-size:11px;color:var(--text3);background:var(--surface);padding:2px 8px;border-radius:4px}
.pt-conf{flex:1;height:3px;background:var(--surface);border-radius:2px;overflow:hidden}
.pt-conf-fill{height:100%;background:var(--purple);border-radius:2px}
.pt-pct{font-size:11px;color:var(--purple);font-weight:600}

/* Graph */
/* graph opens in new tab — no container needed */

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty p{font-size:14px}

/* Spinner */
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--purple);
  border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
/* For You */
.fy{max-width:700px;margin:0 auto;padding:32px 24px;animation:fadeIn .5s}
.fy-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.fy-title{font-size:20px;font-weight:600}
.fy-ref{padding:8px 16px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s}
.fy-ref:hover{border-color:rgba(139,92,246,.3);color:#fff}
.fy-meta{font-size:11px;color:var(--text4);margin-right:12px}
.fy-sec{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#444;
  margin:32px 0 16px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.04)}
.fy-pulse{font-size:16px;color:#ccc;line-height:1.7;padding:20px 24px;background:var(--sb);border-radius:12px;border-left:3px solid var(--purple)}
.fy-card{background:#111;border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:10px}
.fy-card-dom{font-size:11px;color:var(--purple);font-weight:600;letter-spacing:.5px;margin-bottom:8px}
.fy-card-txt{font-size:14px;color:#ccc;line-height:1.6}
.fy-card-ev{font-size:12px;color:var(--text3);margin-top:8px;font-style:italic}
.fy-card-hi{border-left:3px solid var(--red)}.fy-card-md{border-left:3px solid var(--amber)}.fy-card-lo{border-left:3px solid var(--green)}
.fy-pr{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.fy-pr-name{flex:1;color:#fff;font-weight:500;font-size:14px}
.fy-pr-rel{flex:1;color:var(--text2);font-size:12px}
.fy-pr-tr{font-size:11px;padding:3px 10px;border-radius:12px}
.tr-strengthening{background:rgba(34,197,94,.1);color:var(--green)}
.tr-stable{background:rgba(59,130,246,.1);color:var(--blue)}
.tr-fading{background:rgba(234,179,8,.1);color:var(--amber)}
.tr-neglected{background:rgba(239,68,68,.1);color:var(--red)}
.fy-pr-an{font-size:12px;color:var(--text2);padding:4px 0 0;line-height:1.4}
.fy-pr-act{font-size:12px;color:var(--purple);padding:4px 0 8px}
.fy-gc{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.fy-gc-hd{display:flex;justify-content:space-between;align-items:center}
.fy-gc-name{color:#fff;font-weight:500;font-size:14px}
.fy-gc-st{font-size:11px;padding:3px 10px;border-radius:12px}
.st-on_track{background:rgba(34,197,94,.1);color:var(--green)}
.st-falling_behind{background:rgba(234,179,8,.1);color:var(--amber)}
.st-stalled{background:rgba(239,68,68,.1);color:var(--red)}
.st-just_started{background:rgba(59,130,246,.1);color:var(--blue)}
.fy-gc-as{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.5}
.fy-bl{background:var(--sb);border:1px solid rgba(139,92,246,.15);border-radius:12px;padding:18px 22px;margin-bottom:10px}
.fy-bl-tl{font-size:14px;font-weight:600;color:var(--purple);margin-bottom:8px}
.fy-bl-txt{font-size:13px;color:#ccc;line-height:1.6}
.fy-bl-q{font-size:13px;color:var(--amber);margin-top:10px;font-style:italic}
.fy-act{display:flex;gap:16px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.fy-act-t{min-width:100px;font-size:12px;font-weight:600;color:var(--purple)}
.fy-act-tx{font-size:14px;color:#fff}
.fy-act-r{font-size:12px;color:var(--text3);margin-top:4px}
.fy-act-critical .fy-act-t{color:var(--red)}.fy-act-high .fy-act-t{color:var(--amber)}
.fy-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.fy-chip{padding:10px 18px;background:var(--surface);border:1px solid var(--border);border-radius:20px;
  color:#ccc;font-size:13px;cursor:pointer;transition:all .2s}
.fy-chip:hover{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.3);color:#fff}
.fy-load{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px}
.fy-load-t{color:var(--text3);font-size:14px}.fy-load-s{color:var(--text4);font-size:12px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ═══ CONVERSATION LIST ═══ */
#conv-list{margin-top:12px;max-height:calc(100vh - 400px);overflow-y:auto}
.conv-item{padding:10px 12px;border-radius:8px;cursor:pointer;position:relative;
  margin-bottom:2px;transition:background .15s;border-left:2px solid transparent}
.conv-item:hover{background:rgba(255,255,255,.04)}
.conv-active{background:rgba(139,92,246,.1);border-left-color:#8b5cf6}
.conv-title{font-size:13px;color:#e2e8f0;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;padding-right:20px}
.conv-preview{font-size:11px;color:#555;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;margin-top:2px}
.conv-delete{position:absolute;right:8px;top:10px;background:none;border:none;
  color:#555;font-size:16px;cursor:pointer;display:none;padding:0 4px}
.conv-item:hover .conv-delete{display:block}
.conv-delete:hover{color:#ef4444}
.conv-sep{font-size:11px;color:var(--text4);padding:8px 12px 4px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase}

/* ═══ MOBILE ═══ */
@media(max-width:768px){
  #sb{position:fixed;left:0;top:0;bottom:0;z-index:55}
  #sb.shut{width:0;min-width:0}
  #ham{display:flex}
  #rp{width:100%}
  .m-u-b{max-width:90%}
  .msgs-inner{padding:16px}
  .welcome h2{font-size:22px}
  .chips{gap:8px}
  .chip{font-size:12px;padding:8px 14px}
  #inp{padding:12px 16px 8px;left:0}
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login">
<div class="lc">
  <div class="lc-logo"><h1>Anant</h1><p>by Neural AI</p></div>
  <div class="lc-tabs">
    <button class="lc-tab on" onclick="switchTab('login')">Log in</button>
    <button class="lc-tab" onclick="switchTab('signup')">Sign up</button>
  </div>
  <form onsubmit="handleAuth(event)">
    <div class="lc-name" id="nf">
      <label class="lc-label">Name</label>
      <input type="text" id="a-name" placeholder="Your name">
    </div>
    <label class="lc-label">Username</label>
    <input type="text" id="a-user" placeholder="Enter username" required autocomplete="username">
    <label class="lc-label">Password</label>
    <input type="password" id="a-pass" placeholder="Enter password" required autocomplete="current-password">
    <button type="submit" class="lc-btn" id="a-btn">Log in</button>
    <div class="lc-err" id="a-err"></div>
  </form>
  <div class="lc-footer">Sovereign AI, Made in India</div>
</div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">

<!-- Hamburger -->
<button id="ham" onclick="toggleSB()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>

<!-- Sidebar -->
<aside id="sb">
  <div class="sb-top">
    <div class="sb-brand"><h1>Anant</h1><span class="dot"></span></div>
    <div class="sb-sub">by Neural AI</div>
    <button class="sb-new" onclick="newChat()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>
      New Chat
    </button>
    <div class="conv-sep">History</div>
    <div id="conv-list"></div>
  </div>
  <nav class="sb-nav">
    <button class="sb-i on" data-v="chat" onclick="go('chat')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Chat</button>
    <button class="sb-i" data-v="foryou" onclick="go('foryou')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>For You</button>
    <button class="sb-i" onclick="loadGraph()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><path d="M14.5 9.5l3-3M9.5 14.5l-3 3"/></svg>Memory Graph</button>
    <button class="sb-i" data-v="profile" onclick="go('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</button>
    <button class="sb-i" data-v="emotions" onclick="go('emotions')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z"/></svg>Emotions</button>
    <button class="sb-i" data-v="patterns" onclick="go('patterns')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.663 17h4.674M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>Patterns</button>
    <button class="sb-i" data-v="stats" onclick="go('stats')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>Stats</button>
    <div class="sb-sep"></div>
    <button class="sb-i" onclick="doDream()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>Dream Cycle</button>
    <button class="sb-i" onclick="doForget()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>Clear Memory</button>
  </nav>
  <div class="sb-foot">
    <div class="sb-user">
      <div class="sb-avatar" id="sb-av">?</div>
      <span class="sb-uname" id="sb-un"></span>
      <button class="sb-out" onclick="logout()" title="Logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
    <div class="sb-pw">Powered by Neural AI</div>
  </div>
</aside>

<!-- Main -->
<div id="main">
  <!-- Chat -->
  <div id="cv">
    <div id="top">
      <h2>Anant 1.0</h2>
      <span class="pill pill-general" id="ppill">general</span>
    </div>
    <div id="msgs">
      <div class="welcome" id="welc">
        <h2>What can I help you with?</h2>
        <p>I'm Anant, your personal AI with persistent memory</p>
        <div class="chips">
          <button class="chip" onclick="sendChip(this)">Tell me about yourself</button>
          <button class="chip" onclick="sendChip(this)">What's on your mind?</button>
          <button class="chip" onclick="sendChip(this)">Help me brainstorm</button>
          <button class="chip" onclick="sendChip(this)">Let's solve a problem</button>
        </div>
      </div>
    </div>
    <div id="inp">
      <div class="inp-wrap">
        <div class="inp-box">
          <textarea id="mi" rows="1" placeholder="Message Anant..." onkeydown="kd(event)" oninput="ar(this)"></textarea>
          <button id="send" onclick="send()" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>
          </button>
        </div>
        <div class="inp-note">Anant can make mistakes. Verify important info.</div>
      </div>
    </div>
  </div>

  <!-- Graph -->
  <!-- For You view -->
  <div id="fyv" style="display:none;position:absolute;inset:0;overflow-y:auto;background:var(--bg)">
    <div id="fy-content"></div>
  </div>

  <!-- Right panel -->
  <div id="rp">
    <div class="rp-h">
      <h3 id="rp-t">Panel</h3>
      <button class="rp-x" onclick="closeP()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="rp-b" id="rp-b"></div>
  </div>
</div>
</div>

<script>
const API_URL = "https://scoldedly-unfinical-julius.ngrok-free.dev";
let authMode="login",persona="general",currentConversationId=null;

/* ── API ── */
async function api(m,e,b){
  const t=sessionStorage.getItem("anant_token");
  const h={"Content-Type":"application/json","ngrok-skip-browser-warning":"true"};
  if(t)h["Authorization"]="Bearer "+t;
  const o={method:m,headers:h};
  if(b)o.body=JSON.stringify(b);
  try{
    const r=await fetch(API_URL+e,o);
    if(r.status===401){sessionStorage.removeItem("anant_token");showLogin();return null}
    if(r.status===429){showToast("Rate limit exceeded");return null}
    return await r.json();
  }catch(er){console.error("API:",er);return null}
}

/* ── Escaping ── */
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

/* ── Toast ── */
function showToast(msg){
  let t=document.createElement("div");
  t.textContent=msg;
  Object.assign(t.style,{position:"fixed",bottom:"80px",left:"50%",transform:"translateX(-50%)",
    background:"var(--surface)",color:"var(--text)",padding:"10px 20px",borderRadius:"10px",
    fontSize:"13px",zIndex:"999",border:"1px solid var(--border)",animation:"fadeIn .2s"});
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

/* ── Auth ── */
function switchTab(m){
  authMode=m;
  document.querySelectorAll(".lc-tab").forEach((t,i)=>t.classList.toggle("on",(i===0&&m==="login")||(i===1&&m==="signup")));
  document.getElementById("nf").style.display=m==="signup"?"block":"none";
  document.getElementById("a-btn").textContent=m==="login"?"Log in":"Sign up";
  document.getElementById("a-err").textContent="";
}
async function handleAuth(e){
  e.preventDefault();
  const btn=document.getElementById("a-btn"),err=document.getElementById("a-err");
  const u=document.getElementById("a-user").value.trim(),p=document.getElementById("a-pass").value;
  const n=document.getElementById("a-name").value.trim();
  if(!u||!p){err.textContent="Please fill all fields";return}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';err.textContent="";
  const ep=authMode==="login"?"/api/auth/login":"/api/auth/signup";
  const body=authMode==="login"?{username:u,password:p}:{username:u,password:p,name:n||null};
  const d=await api("POST",ep,body);
  btn.disabled=false;btn.textContent=authMode==="login"?"Log in":"Sign up";
  if(!d){err.textContent="Connection failed";return}
  if(d.detail){err.textContent=d.detail;return}
  if(d.access_token){
    sessionStorage.setItem("anant_token",d.access_token);
    sessionStorage.setItem("anant_uid",d.user_id);
    sessionStorage.setItem("anant_user",u);
    showApp();
  }else{err.textContent="Unexpected error"}
}
function showLogin(){document.getElementById("login").style.display="flex";document.getElementById("app").style.display="none"}
function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";
  const u=sessionStorage.getItem("anant_user")||"?";
  document.getElementById("sb-un").textContent=u;
  document.getElementById("sb-av").textContent=u[0].toUpperCase();
  document.getElementById("mi").focus();
  loadConversations();
}
function logout(){sessionStorage.clear();resetChat();showLogin()}
if(sessionStorage.getItem("anant_token")){showApp()}else{showLogin()}

/* ── Sidebar ── */
function toggleSB(){document.getElementById("sb").classList.toggle("shut")}

/* ── Views ── */
function go(v){
  document.querySelectorAll(".sb-i[data-v]").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
  document.getElementById("cv").style.display=v==="chat"?"flex":"none";
  document.getElementById("fyv").style.display=v==="foryou"?"block":"none";
  closeP();
  if(v==="foryou")loadForYou();
  else if(v==="profile")openP("Profile",loadProfile);
  else if(v==="emotions")openP("Emotions",loadEmotions);
  else if(v==="patterns")openP("Patterns",loadPatterns);
  else if(v==="stats")openP("Stats",loadStats);
  if(!["chat","foryou"].includes(v))document.getElementById("cv").style.display="flex";
  if(innerWidth<=768)document.getElementById("sb").classList.add("shut");
}
function openP(t,fn){
  document.getElementById("rp-t").textContent=t;
  document.getElementById("rp-b").innerHTML='<div style="text-align:center;padding:40px"><span class="spin"></span></div>';
  document.getElementById("rp").classList.add("open");fn();
}
function closeP(){document.getElementById("rp").classList.remove("open")}
function newChat(){currentConversationId=null;resetChat();go("chat");loadConversations()}

/* ── Markdown ── */
function md(t){
  if(!t)return"";
  return t
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    .replace(/^### (.+)$/gm,"<h3>$1</h3>")
    .replace(/^## (.+)$/gm,"<h2>$1</h2>")
    .replace(/^# (.+)$/gm,"<h1>$1</h1>")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/^> (.+)$/gm,"<blockquote>$1</blockquote>")
    .replace(/^- (.+)$/gm,"<li>$1</li>")
    .replace(/^\d+\. (.+)$/gm,"<li>$1</li>")
    .replace(/(<li>.*?<\/li>\n?)+/g,m=>"<ul>"+m+"</ul>")
    .replace(/\n\n/g,"</p><p>")
    .replace(/\n/g,"<br>")
    .replace(/^/,"<p>").replace(/$/,"</p>");
}

/* ── Chat ── */
function ts(){return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
function getInner(){
  let c=document.querySelector(".msgs-inner");
  if(!c){c=document.createElement("div");c.className="msgs-inner";document.getElementById("msgs").appendChild(c)}
  return c;
}
function addMsg(role,text,thinking,per){
  const w=document.getElementById("welc");if(w)w.remove();
  const box=getInner();
  const el=document.createElement("div");el.className="m";
  if(role==="user"){
    el.classList.add("m-u");
    el.innerHTML=`<div class="m-u-b">${md(text)}</div><div class="m-time">${ts()}</div>`;
  }else{
    el.classList.add("m-a");
    let th="";
    if(thinking){
      th=`<div class="think-t" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>Thought process</div>
        <div class="think-c">${md(thinking)}</div>`;
    }
    el.innerHTML=`<div class="m-a-label">Anant</div>${th}<div class="m-a-body">${md(text)}</div>
      <div class="m-fb">
        <button onclick="fb('good',this)" title="Good"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/></svg></button>
        <button onclick="fb('bad',this)" title="Bad"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 15V19a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z"/></svg></button>
      </div>
      <div class="m-time">${ts()}</div>`;
    if(per)setPill(per);
  }
  box.appendChild(el);
  scrollB();
}
function setPill(p){
  const el=document.getElementById("ppill");
  el.textContent=p;el.className="pill pill-"+(p||"general");
}
function showTyp(){
  const el=document.createElement("div");el.className="typing";el.id="typ";
  el.innerHTML='<div class="typing-inner"><div class="typing-dots"><span></span><span></span><span></span></div>Anant is thinking...</div>';
  document.getElementById("msgs").appendChild(el);scrollB();
}
function hideTyp(){const e=document.getElementById("typ");if(e)e.remove()}
function scrollB(){const m=document.getElementById("msgs");m.scrollTop=m.scrollHeight}
function resetChat(){
  document.getElementById("msgs").innerHTML='<div class="welcome" id="welc"><h2>What can I help you with?</h2><p>I\'m Anant, your personal AI with persistent memory</p><div class="chips"><button class="chip" onclick="sendChip(this)">Tell me about yourself</button><button class="chip" onclick="sendChip(this)">What\'s on your mind?</button><button class="chip" onclick="sendChip(this)">Help me brainstorm</button><button class="chip" onclick="sendChip(this)">Let\'s solve a problem</button></div></div>';
}
function sendChip(el){document.getElementById("mi").value=el.textContent;send()}

async function send(){
  const i=document.getElementById("mi"),b=document.getElementById("send");
  const t=i.value.trim();if(!t)return;
  i.value="";i.style.height="auto";b.disabled=true;
  addMsg("user",t);showTyp();
  const d=await api("POST","/api/chat",{message:t,conversation_id:currentConversationId});
  hideTyp();b.disabled=false;
  if(d&&d.response){
    addMsg("ai",d.response,d.thinking,d.persona);persona=d.persona||"general";
    if(d.conversation_id)currentConversationId=d.conversation_id;
    loadConversations();
  }
  else if(d&&d.detail)addMsg("ai","Error: "+d.detail);
  else addMsg("ai","Sorry, could not connect to the server.");
  i.focus();
}
function kd(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}
  if(e.key==="Escape")closeP();
}
function ar(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,150)+"px";
  document.getElementById("send").disabled=!el.value.trim()}
document.getElementById("mi").addEventListener("input",function(){document.getElementById("send").disabled=!this.value.trim()});
async function fb(type,btn){
  btn.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("voted"));
  btn.classList.add("voted");await api("POST","/api/feedback",{feedback:type});
}

/* ── Profile ── */
function moodCol(m){
  const c={happy:"#22c55e",excited:"#8b5cf6",stressed:"#ef4444",anxious:"#ef4444",angry:"#ef4444",
    sad:"#3b82f6",tired:"#3b82f6",neutral:"#888"};
  return c[m]||"#888";
}
async function loadProfile(){
  const d=await api("GET","/api/profile");if(!d)return;
  const b=document.getElementById("rp-b");
  const id=d.identity||{};
  const name=esc(id.name||"Unknown");
  const init=name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
  const occ=esc(id.occupation||"");const co=esc(id.company||"");
  const occLine=occ&&co?`${occ} @ ${co}`:occ||co||"";
  let h=`<div class="pf-top"><div class="pf-av">${init}</div><div class="pf-name">${name}</div><div class="pf-occ">${occLine}</div></div>`;
  // Mood
  const mc=moodCol(d.mood);
  h+=`<div class="pf-row"><span class="k">Mood</span><span class="v" style="color:${mc}">${esc(d.mood||"neutral")}</span></div>`;
  // Identity fields
  const fields=[["Location",id.location],["Education",id.education],["Age",id.age]];
  h+=fields.map(([k,v])=>v?`<div class="pf-row"><span class="k">${k}</span><span class="v">${esc(v)}</span></div>`:"").join("");
  // People
  if(d.people&&d.people.length){
    h+='<div class="pf-sec">People</div>';
    h+=d.people.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="color:#fff;font-weight:500;font-size:14px">${esc(p.name)}</span><span style="font-size:11px;padding:2px 8px;border-radius:12px;background:rgba(139,92,246,.15);color:#8b5cf6">${esc(p.relation||"known")}</span></div>`).join("");
  }
  // Work & Education
  if((d.work&&d.work.length)||(d.education&&d.education.length)){
    h+='<div class="pf-sec">Work & Education</div>';
    (d.work||[]).forEach(w=>{h+=`<div class="pf-row"><span class="v">${esc(w.name)}</span><span class="k">${esc(w.role)}</span></div>`});
    (d.education||[]).forEach(e=>{h+=`<div class="pf-row"><span class="v">${esc(e.name)}</span><span class="k">${esc(e.relation)}</span></div>`});
  }
  // Likes
  if(d.likes&&d.likes.length){
    h+='<div class="pf-sec">Likes</div>';
    h+=d.likes.map(l=>`<span class="pref-t pos">${esc(l)}</span>`).join("");
  }
  // Dislikes
  if(d.dislikes&&d.dislikes.length){
    h+='<div class="pf-sec">Dislikes</div>';
    h+=d.dislikes.map(l=>`<span class="pref-t neg">${esc(l)}</span>`).join("");
  }
  // Goals
  if(d.goals&&d.goals.length){
    h+='<div class="pf-sec">Goals</div>';
    h+=d.goals.map(g=>`<div class="pf-row"><span class="v">${esc(g)}</span></div>`).join("");
  }
  // Health
  if(d.health&&d.health.length){
    h+='<div class="pf-sec">Health</div>';
    h+=d.health.map(s=>`<div class="pf-row"><span class="v" style="color:var(--amber)">${esc(s)}</span></div>`).join("");
  }
  // Events
  if(d.events&&d.events.length){
    h+='<div class="pf-sec">Events</div>';
    h+=d.events.map(e=>`<div class="pf-row"><span class="v">${esc(e.name)}</span><span class="k">${esc(e.when||"")}</span></div>`).join("");
  }
  b.innerHTML=h||'<div class="empty"><p>No profile data yet</p></div>';
}

/* ── Emotions ── */
async function loadEmotions(){
  const d=await api("GET","/api/emotions?days=30");if(!d)return;
  const b=document.getElementById("rp-b");
  if(!d.emotions||!d.emotions.length){b.innerHTML='<div class="empty"><p>No emotions recorded yet</p></div>';return}
  const c={happy:"var(--green)",excited:"var(--purple)",stressed:"var(--red)",sad:"var(--blue)",
    angry:"#f97316",tired:"var(--text3)",neutral:"var(--text3)",anxious:"var(--amber)"};
  b.innerHTML=d.emotions.slice(-30).reverse().map(e=>{
    const col=c[e.state]||"var(--text3)";const int=e.intensity||.5;
    return`<div class="em-i"><span class="em-dot" style="background:${col}"></span><span class="em-st">${e.state}</span><div class="em-bar"><div class="em-bar-fill" style="width:${int*100}%;background:${col}"></div></div><span class="em-time">${e.timestamp?new Date(e.timestamp).toLocaleDateString("en-US",{month:"short",day:"numeric"}):""}</span></div>`;
  }).join("");
}

/* ── Stats ── */
async function loadStats(){
  const d=await api("GET","/api/stats");if(!d)return;
  const b=document.getElementById("rp-b");
  const i=[["entities","Entities"],["memories","Memories"],["relationships","Relations"],["emotions","Emotions"],["patterns","Patterns"]];
  b.innerHTML='<div class="st-grid">'+i.map(([k,l])=>`<div class="st-card"><div class="n">${d[k]||0}</div><div class="l">${l}</div></div>`).join("")+"</div>";
}

/* ── Patterns ── */
async function loadPatterns(){
  const d=await api("GET","/api/patterns");if(!d)return;
  const b=document.getElementById("rp-b");
  if(!d.patterns||!d.patterns.length){b.innerHTML='<div class="empty"><p>No patterns yet</p></div>';return}
  b.innerHTML=d.patterns.map(p=>{
    const pct=Math.round(p.confidence*100);
    return`<div class="pt-i"><div class="pt-desc">${p.description}</div><div class="pt-meta"><span class="pt-type">${p.type}</span><div class="pt-conf"><div class="pt-conf-fill" style="width:${pct}%"></div></div><span class="pt-pct">${pct}%</span></div></div>`;
  }).join("");
}

/* ── Graph ── */
async function loadGraph(){
  showToast("Opening memory graph...");
  const d=await api("GET","/api/graph");
  if(d&&d.html){
    const blob=new Blob([d.html],{type:"text/html"});
    const url=URL.createObjectURL(blob);
    window.open(url,"_blank");
  }else{
    showToast("No graph data yet. Chat more to build your graph.");
  }
}

/* ── Dream ── */
async function doDream(){
  showToast("Running dream cycle...");
  const d=await api("POST","/api/dream");
  if(d)showToast(`Dream done — ${d.insights_generated} insights, ${d.memories_consolidated} consolidated`);
}

/* ── Forget ── */
async function doForget(){
  if(!confirm("Permanently erase ALL memories?"))return;
  await api("POST","/api/forget");resetChat();showToast("Memory cleared");
}

/* ── For You ── */
function timeAgo(iso){
  const d=Date.now()-new Date(iso).getTime();
  const m=Math.floor(d/60000);if(m<60)return m+"m ago";
  const h=Math.floor(m/60);if(h<24)return h+"h ago";
  return Math.floor(h/24)+"d ago";
}
async function loadForYou(){
  const el=document.getElementById("fy-content");
  el.innerHTML='<div class="fy"><div class="fy-load"><div class="spin"></div><div class="fy-load-t">Anant is analyzing your life...</div><div class="fy-load-s">Running multi-pass reasoning</div></div></div>';
  try{
    const d=await api("GET","/api/foryou");
    if(!d){el.innerHTML='<div class="fy"><div style="text-align:center;padding:60px;color:#555">Could not connect to server.</div></div>';return}
    if(!d.life_pulse){el.innerHTML='<div class="fy"><div style="text-align:center;padding:60px;color:#555">Not enough data yet. Chat with Anant to build your life model.</div></div>';return}
    const arr=x=>{if(Array.isArray(x))return x;if(typeof x==="string"){try{const p=JSON.parse(x);if(Array.isArray(p))return p}catch(e){}}return[]};
    const esc=s=>(s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    let h='<div class="fy">';
    h+=`<div class="fy-hd"><div class="fy-title">For You</div><div>${d.generated_at?'<span class="fy-meta">Updated '+timeAgo(d.generated_at)+'</span>':''}<button class="fy-ref" onclick="refreshFY()">&#8635; Refresh</button></div></div>`;
    h+='<div class="fy-sec">Life Pulse</div>';
    h+=`<div class="fy-pulse">${esc(d.life_pulse)}</div>`;
    const cdi=arr(d.cross_domain_insights);
    if(cdi.length){h+='<div class="fy-sec">What Anant Sees</div>';
      cdi.forEach(i=>{const s=i.severity||"low";
        h+=`<div class="fy-card fy-card-${s==="high"?"hi":s==="medium"?"md":"lo"}"><div class="fy-card-dom">${esc((i.domains||[]).join(" × ")).toUpperCase()}</div><div class="fy-card-txt">${esc(i.insight)}</div>${i.evidence?'<div class="fy-card-ev">'+esc(i.evidence)+'</div>':''}</div>`;});}
    const pi=arr(d.people_intelligence);
    if(pi.length){h+='<div class="fy-sec">Your People</div>';
      pi.forEach(p=>{const t=p.trajectory||"stable";
        h+=`<div><div class="fy-pr"><span class="fy-pr-name">${esc(p.name)}</span><span class="fy-pr-rel">${esc(p.relation)}</span><span class="fy-pr-tr tr-${t}">${t}</span></div>${p.analysis?'<div class="fy-pr-an">'+esc(p.analysis)+'</div>':''}${p.action?'<div class="fy-pr-act">'+esc(p.action)+'</div>':''}</div>`;});}
    const gr=arr(d.goal_reality);
    if(gr.length){h+='<div class="fy-sec">Goal Reality Check</div>';
      gr.forEach(g=>{const s=g.status||"just_started";
        h+=`<div class="fy-gc"><div class="fy-gc-hd"><span class="fy-gc-name">${esc(g.goal)}</span><span class="fy-gc-st st-${s}">${s.replace(/_/g," ")}</span></div>${g.honest_assessment?'<div class="fy-gc-as">'+esc(g.honest_assessment)+'</div>':''}</div>`;});}
    const bs=arr(d.blind_spots);
    if(bs.length){h+='<div class="fy-sec">Blind Spots</div>';
      bs.forEach(b=>{
        h+=`<div class="fy-bl"><div class="fy-bl-tl">${esc(b.title||b.type||"Insight")}</div><div class="fy-bl-txt">${esc(b.insight)}</div>${b.question?'<div class="fy-bl-q">&ldquo;'+esc(b.question)+'&rdquo;</div>':''}</div>`;});}
    const ta=arr(d.tomorrow_actions);
    if(ta.length){h+='<div class="fy-sec">Next 24 Hours</div>';
      ta.forEach(a=>{const p=a.priority||"medium";
        h+=`<div class="fy-act fy-act-${p}"><div class="fy-act-t">${esc(a.time)}</div><div><div class="fy-act-tx">${esc(a.action)}</div>${a.reason?'<div class="fy-act-r">'+esc(a.reason)+'</div>':''}</div></div>`;});}
    const sg=arr(d.suggestions);
    if(sg.length){h+='<div class="fy-sec">Suggested Conversations</div><div class="fy-chips">';
      sg.forEach((s,i)=>{h+=`<button class="fy-chip" onclick="fyChat(${i})">${esc(s)}</button>`;});
      h+='</div>';}
    h+='</div>';el.innerHTML=h;
    window._fySuggestions=sg;
  }catch(err){
    console.error("For You render error:",err);
    el.innerHTML='<div class="fy"><div style="padding:40px;color:var(--red)">Something went wrong rendering the analysis. Check console for details.</div></div>';
  }
}
function fyChat(i){const sg=window._fySuggestions||[];const t=sg[i]||"";if(!t)return;go("chat");document.getElementById("mi").value=t;send()}
async function refreshFY(){
  const el=document.getElementById("fy-content");
  el.innerHTML='<div class="fy"><div class="fy-load"><div class="spin"></div><div class="fy-load-t">Regenerating deep analysis...</div><div class="fy-load-s">This takes 60-90 seconds</div></div></div>';
  try{await api("POST","/api/foryou/refresh");await loadForYou();}catch(err){console.error("Refresh error:",err);el.innerHTML='<div class="fy"><div style="padding:40px;color:var(--red)">Refresh failed. Try again.</div></div>';}
}

/* ── Conversations ── */
async function loadConversations(){
  const d=await api("GET","/api/conversations");if(!d)return;
  const list=document.getElementById("conv-list");list.innerHTML="";
  (d.conversations||[]).forEach(conv=>{
    const div=document.createElement("div");
    div.className="conv-item"+(conv.id===currentConversationId?" conv-active":"");
    div.innerHTML=`<div class="conv-title">${esc(conv.title)}</div><div class="conv-preview">${esc(conv.preview)}</div><button class="conv-delete" onclick="event.stopPropagation();deleteConv('${conv.id}')">&times;</button>`;
    div.onclick=()=>loadConversation(conv.id);
    list.appendChild(div);
  });
}
async function loadConversation(convId){
  currentConversationId=convId;go("chat");
  const d=await api("GET","/api/conversations/"+convId+"/messages");if(!d)return;
  const msgs=document.getElementById("msgs");
  msgs.innerHTML="";
  const box=document.createElement("div");box.className="msgs-inner";
  (d.messages||[]).forEach(msg=>{
    const el=document.createElement("div");el.className="m";
    if(msg.role==="user"){
      el.classList.add("m-u");
      el.innerHTML=`<div class="m-u-b">${md(msg.content)}</div>`;
    }else{
      el.classList.add("m-a");
      let th="";
      if(msg.thinking){th=`<div class="think-t" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>Thought process</div><div class="think-c">${md(msg.thinking)}</div>`;}
      el.innerHTML=`<div class="m-a-label">Anant</div>${th}<div class="m-a-body">${md(msg.content)}</div>`;
      if(msg.persona)setPill(msg.persona);
    }
    box.appendChild(el);
  });
  msgs.appendChild(box);scrollB();
  loadConversations();
}
async function deleteConv(convId){
  if(!confirm("Delete this conversation?"))return;
  await api("DELETE","/api/conversations/"+convId);
  if(currentConversationId===convId){currentConversationId=null;resetChat();}
  loadConversations();
}

/* ── Keys ── */
document.addEventListener("keydown",e=>{
  if(e.key==="Escape")closeP();
  if((e.ctrlKey||e.metaKey)&&e.key==="/"){e.preventDefault();toggleSB()}
});
